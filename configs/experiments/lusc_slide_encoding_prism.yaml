experiment:
  name: lusc_slide_prism

models:
  - prism_virchow-full

slide_encoding:
  enabled: true
  encoder: prism
  feat_model: virchow-full
  agg_feat_model: null
  output_base: stamp_slide_encoding
  device: cuda
  generate_hash: true

advanced_config:
  seed: 42
  max_epochs: 32
  patience: 16
  batch_size: 64
  bag_size: 512
  max_lr: 1e-4
  div_factor: 25.0
  model_name: mlp
  model_params:
    mlp: {}
